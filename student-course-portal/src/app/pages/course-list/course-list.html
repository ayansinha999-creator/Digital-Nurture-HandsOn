<h2>Available Course</h2>

<p><strong>Selected Course:</strong> {{ courseName }}</p>

<hr>

<table border="1" cellpadding="8">

  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Code</th>
    <th>Credits</th>
    <th>Status</th>
  </tr>

  <tr *ngFor="let course of courses">
    <td>{{ course.id }}</td>
    <td>{{ course.name }}</td>
    <td>{{ course.code }}</td>
    <td>{{ course.credits }}</td>
    <td>{{ course.gradeStatus }}</td>
  </tr>

</table>
