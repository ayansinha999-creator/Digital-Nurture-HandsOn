<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()">

  <label>Name</label><br>
  <input type="text" formControlName="name">
  <br><br>

  <label>Email</label><br>
  <input type="email" formControlName="email">
  <br><br>

  <label>Course</label><br>
  <input type="text" formControlName="course">
  <br><br>

  <button type="submit" [disabled]="enrollmentForm.invalid">
    Enroll
  </button>

</form>

<hr>

<h3>Form Value</h3>

<pre>{{ enrollmentForm.value | json }}</pre>
